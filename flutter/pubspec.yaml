name: hyperbabel_demo
description: "A comprehensive Flutter demo application for the HyperBabel API Platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.2
  ably_flutter: ^1.2.14
  agora_rtc_engine: ^6.3.1
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.3.3
  gap: ^3.0.1
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.1.2 # To replace FCM in standard UI if not doing full push logic

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/hyperbabel.png
